# ================================================================
# render.yaml — Render.com deployment configuration
# ================================================================

services:
  - type: web
    name: securehub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 4 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: securehub-db
          property: connectionString
      - key: BCRYPT_LOG_ROUNDS
        value: "12"
      - key: ADMIN_EMAIL
        value: admin@securehub.io
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false   # Set manually in Render dashboard

databases:
  - name: securehub-db
    databaseName: secure_auth_db
    user: securehub
    plan: free
