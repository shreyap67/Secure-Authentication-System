{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block body %}
<div class="radial-glow"></div>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1">
  <div class="text-center animate-fade-in-up" style="max-width:480px">
    <div style="width:80px;height:80px;background:rgba(244,63,94,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;border:1px solid rgba(244,63,94,0.25)">
      <i class="bi bi-shield-x-fill" style="font-size:2rem;color:var(--rose)"></i>
    </div>
    <h1 style="font-size:2rem;font-weight:700;margin-bottom:0.75rem">Access Denied</h1>
    <p class="text-secondary" style="margin-bottom:2rem">You don't have permission to view this page. This area requires elevated privileges.</p>
    <div class="flex gap-3" style="justify-content:center">
      <a href="/dashboard" class="btn btn-primary"><i class="bi bi-grid"></i> Go to Dashboard</a>
      <a href="/"          class="btn btn-ghost"><i class="bi bi-house"></i> Home</a>
    </div>
    <p class="text-muted text-sm" style="margin-top:2rem">Error 403 — Forbidden</p>
  </div>
</div>
{% endblock %}
