{% extends "base.html" %}
{% block title %}Two-Factor Authentication{% endblock %}

{% block body %}
<div class="radial-glow"></div>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1">
  <div class="auth-form-box animate-fade-in-up" style="max-width:400px;width:100%">

    <!-- Header -->
    <div style="text-align:center;margin-bottom:2rem">
      <div style="width:64px;height:64px;background:rgba(59,130,246,0.12);border-radius:50%;
        display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;
        border:1px solid rgba(59,130,246,0.25)">
        <i class="bi bi-shield-lock-fill" style="font-size:1.75rem;color:var(--electric-blue)"></i>
      </div>
      <h1 style="font-size:1.5rem;font-weight:700">Two-Factor Authentication</h1>
      <p class="text-secondary text-sm" style="margin-top:0.5rem">
        Enter the 6-digit code from your authenticator app
      </p>
    </div>

    <div id="alert-container"></div>

    <div class="glass-card p-6">
      <div class="form-group" style="margin-bottom:1.5rem">
        <label class="form-label" for="totp-code">Authentication Code</label>
        <input type="text" id="totp-code" class="form-control font-mono"
          placeholder="000000" maxlength="10" autocomplete="one-time-code"
          style="text-align:center;font-size:1.5rem;letter-spacing:0.3em"
          oninput="this.value=this.value.replace(/[^0-9A-Z\-]/g,'')" />
        <span class="form-hint" style="margin-top:0.5rem">
          Can't access your app? Use a backup recovery code.
        </span>
      </div>

      <button type="button" id="verify-btn" class="btn btn-gradient btn-full btn-lg"
        onclick="handleVerify()">
        <i class="bi bi-shield-check"></i> Verify & Sign In
      </button>
    </div>

    <p class="text-center text-sm mt-6" style="color:var(--text-secondary)">
      <a href="/login" style="color:var(--text-link);text-decoration:none">
        <i class="bi bi-arrow-left"></i> Back to login
      </a>
    </p>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    window.location.href = '/dashboard';
  }

  // Get partial token from sessionStorage (set during login)
  const partialToken = sessionStorage.getItem('2fa_partial_token');
  if (!partialToken) {
    window.location.href = '/login';
  }

  // Auto-submit when 6 digits entered
  document.getElementById('totp-code').addEventListener('input', (e) => {
    const val = e.target.value.replace(/[^0-9]/g,'');
    if (val.length === 6) setTimeout(handleVerify, 200);
  });

  // Also submit on Enter
  document.getElementById('totp-code').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleVerify();
  });

  async function handleVerify() {
    const code = document.getElementById('totp-code').value.trim();
    const btn  = document.getElementById('verify-btn');
    const alertEl = document.getElementById('alert-container');

    if (!code) {
      alertEl.innerHTML = `<div class="alert alert-error" style="margin-bottom:1rem">
        <i class="bi bi-x-circle-fill"></i><span>Please enter your authentication code.</span></div>`;
      return;
    }

    setButtonLoading(btn, true);

    const res = await API.post('/auth/2fa/verify-login', {
      code: code,
      partial_token: partialToken,
    }, false);

    setButtonLoading(btn, false);

    if (!res) return;

    if (res.success) {
      sessionStorage.removeItem('2fa_partial_token');
      Auth.setTokens(res.access_token, res.refresh_token);
      Auth.setUser(res.user);
      Toast.success('Welcome back, ' + res.user.username + '!');
      setTimeout(() => {
        window.location.href = res.user.role === 'admin' ? '/admin' : '/dashboard';
      }, 600);
    } else {
      alertEl.innerHTML = `<div class="alert alert-error" style="margin-bottom:1rem">
        <i class="bi bi-x-circle-fill"></i><span>${res.message}</span></div>`;
      document.getElementById('totp-code').value = '';
      document.getElementById('totp-code').focus();
    }
  }

  // Focus input on load
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('totp-code').focus();
  });
</script>
{% endblock %}
