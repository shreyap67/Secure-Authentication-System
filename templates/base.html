<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="description" content="SecureHub — Enterprise Authentication Platform" />
  <title>{% block title %}SecureHub{% endblock %} · SecureHub</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts: Sora (headings) + DM Sans (body) + JetBrains Mono (code) -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />

  <!-- Global JS — loaded first so helpers are available to page scripts -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <!-- Theme init — runs inline before render to prevent any flash -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>

  {% block head %}{% endblock %}
</head>
<body>

  {% block body %}{% endblock %}

  <!-- ── Logout Confirmation Modal ───────────────────────────── -->
  <div class="logout-modal-overlay" id="logout-modal" role="dialog"
       aria-modal="true" aria-labelledby="logout-modal-title"
       onclick="handleModalOverlayClick(event)">
    <div class="logout-modal-box">
      <div class="logout-modal-icon">
        <i class="bi bi-box-arrow-right"></i>
      </div>
      <div class="logout-modal-title" id="logout-modal-title">Sign out of SecureHub?</div>
      <div class="logout-modal-desc">
        Your session will be securely terminated.<br>You can sign back in at any time.
      </div>
      <div class="logout-modal-actions">
        <button class="btn btn-ghost" onclick="closeLogoutModal()" id="modal-cancel-btn">
          Cancel
        </button>
        <button class="btn btn-danger" onclick="confirmLogout()" id="modal-logout-btn">
          <i class="bi bi-box-arrow-right"></i> Sign Out
        </button>
      </div>
    </div>
  </div>

  <!-- Global theme toggle button -->
  <button class="theme-toggle" onclick="globalThemeToggle()" title="Toggle theme" id="global-theme-btn">
    <i class="bi bi-moon-stars-fill" id="global-theme-icon"></i>
  </button>

  {% block scripts %}{% endblock %}

  <script>
    // ── Theme ────────────────────────────────────────────────────
    // Set correct icon immediately on load (no flash)
    (function() {
      var t    = localStorage.getItem('theme') || 'dark';
      var icon = document.getElementById('global-theme-icon');
      if (icon) icon.className = t === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
    })();

    function globalThemeToggle() {
      var current = document.documentElement.getAttribute('data-theme') || 'dark';
      var next    = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      var icon = document.getElementById('global-theme-icon');
      if (icon) icon.className = next === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
      // Sync to server silently if logged in
      try {
        if (Auth && Auth.isLoggedIn()) {
          API.put('/user/theme', { theme: next });
        }
      } catch(e) {}
    }

    // ── Logout Modal ─────────────────────────────────────────────
    function openLogoutModal() {
      var modal = document.getElementById('logout-modal');
      modal.classList.add('open');
      // Focus cancel button for keyboard accessibility
      setTimeout(function() {
        var btn = document.getElementById('modal-cancel-btn');
        if (btn) btn.focus();
      }, 240);
    }

    function closeLogoutModal() {
      document.getElementById('logout-modal').classList.remove('open');
    }

    function confirmLogout() {
      var btn = document.getElementById('modal-logout-btn');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Signing out…';
      }
      // Call the global logout() function defined in app.js
      if (typeof logout === 'function') logout();
    }

    function handleModalOverlayClick(e) {
      // Close if user clicks the backdrop (not the box itself)
      if (e.target === document.getElementById('logout-modal')) {
        closeLogoutModal();
      }
    }

    // Escape key closes modal
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLogoutModal();
    });

    // Intercept all [data-action="logout"] clicks to show modal instead
    document.addEventListener('click', function(e) {
      var el = e.target.closest('[data-action="logout"]');
      if (el) {
        e.preventDefault();
        e.stopPropagation();
        openLogoutModal();
      }
    }, true);
  </script>
</body>
</html>
